project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "*.md"
    - "research_data/data-vis/*.ipynb"
    - "!research_data/data-vis/ar6-authors-distribution-analysis.ipynb"
    - "!research_data/data-vis/wikibase-inventory-dashboard.ipynb"
    - "!research_data/data-import/"

website:
  title: "Climate-KG Data Analysis"
  navbar:
    left:
      - text: "Home"
        file: index.qmd
      - text: "AR6 Gender Distribution"
        file: research_data/data-vis/gender-distribution-simple.ipynb
      # - text: "AR6 Authors Analysis"
      #   file: research_data/data-vis/ar6-authors-distribution-analysis.ipynb
      # - text: "Wikibase Inventory"
      #   file: research_data/data-vis/wikibase-inventory-dashboard.ipynb
      - text: "Data Documentation"
        menu:
          - text: "XML/HTML Pipeline Overview"
            file: xml-html-documentation.md
          - text: "---"
          - text: "Generated Data Pages"
          - text: "Authors Directory"
            href: data/authors-ar6.html
          - text: "Acronyms Index"
            href: data/acronyms-ar6.html
          - text: "Bibliography"
            href: data/bibliographic-ar6.html
          - text: "Corpus Structure"
            href: data/corpus-ar6.html
          - text: "Glossary"
            href: data/glossary-ar6.html

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-fold: true
    code-tools: true
    code-summary: "Show code"
    number-sections: false
    fig-width: 10
    fig-height: 7
    ipynb-shell-interactivity: all
    include-in-header:
      - text: |
          <script src="https://cdn.plot.ly/plotly-latest.min.js" charset="utf-8"></script>

execute:
  freeze: false
  warning: false
  enabled: true
  execute-dir: project
